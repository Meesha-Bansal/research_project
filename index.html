<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Blood Flow 3D</title>

<link rel="stylesheet" href="style.css">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.183.2/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.183.2/examples/jsm/"
  }
}
</script>

</head>

<body>
<div id="overlay" style="
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: #111;
  background: #f0f0f0;
">
  <div id="overlayText" style="max-width: 720px; padding: 24px; text-align: center;">
    Loading 3D model…
  </div>
</div>

<!-- Fullscreen video overlay for english.mkv -->
<div id="videoOverlay" style="
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.8);
  z-index: 20;
">
  <div style="
    position: relative;
    max-width: 80vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  ">
    <button id="videoCloseButton" style="
      position: absolute;
      top: -40px;
      right: 0;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: #ffffff;
      cursor: pointer;
    ">Close</button>
    <video
      id="heartVideo"
      src="/english.mkv"
      controls
      style="width: 100%; max-height: 70vh;"
      controlsList="nodownload noplaybackrate noremoteplayback"
      disablePictureInPicture
      playsInline
    ></video>
    <div style="margin-top: 8px; text-align: center; color: #fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;">
      <div style="margin-bottom: 4px;">
        <span style="margin-right: 8px;">Playback:</span>
        <button id="videoPlayPauseBtn">Play / Pause</button>
        <button id="videoRewindBtn">-10s</button>
        <button id="videoForwardBtn">+10s</button>
      </div>
      <div style="margin-top: 4px;">
        <span style="margin-right: 8px;">Speed:</span>
        <button class="videoSpeedBtn" data-rate="0.5">0.5x</button>
        <button class="videoSpeedBtn videoSpeedBtn-active" data-rate="1">1x</button>
        <button class="videoSpeedBtn" data-rate="1.5">1.5x</button>
        <button class="videoSpeedBtn" data-rate="2">2x</button>
      </div>
    </div>
  </div>
</div>

<!-- Simple button to open the video -->
<button id="videoOpenButton" style="
  position: fixed;
  bottom: 16px;
  right: 16px;
  padding: 8px 14px;
  border-radius: 4px;
  border: none;
  background: #d32f2f;
  color: #fff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  cursor: pointer;
  z-index: 10;
">
  Open Video
</button>

<script type="module" src="/script.js"></script>

</body>
</html>
